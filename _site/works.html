            text-align: right;
        }
        .row {

        }
    </style>
</head>

    <!-- Works Section -->

        <h2>my works</h2>

        <!-- Sort By Dropdown (Right Aligned) -->
        <div class="sort-dropdown mb-3">
            <label for="sortProjects" class="form-label">Sort by:</label>
            <select id="sortProjects" class="form-select w-auto d-inline-block">
                <option value="mostRecent">Most Recent</option>
                <option value="leastRecent">Least Recent</option>

    <script>
        // Sorting Functionality
        document.getElementById('sortProjects').addEventListener('change', function() {
            const sortBy = this.value;
            const projectsContainer = document.getElementById('projectsContainer');
            const projects = Array.from(projectsContainer.getElementsByClassName('project-card'));

            projects.sort((a, b) => {
                if (sortBy === 'mostRecent') {
                    return new Date(b.getAttribute('data-date')) - new Date(a.getAttribute('data-date'));
                } else if (sortBy === 'leastRecent') {
                    return new Date(a.getAttribute('data-date')) - new Date(b.getAttribute('data-date'));
                } else if (sortBy === 'featured') {
                    return (b.getAttribute('data-featured') === 'true') - (a.getAttribute('data-featured') === 'true');
                }
            });

            // Re-order the DOM
            projects.forEach(project => projectsContainer.appendChild(project));
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
