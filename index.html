    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const typingText = document.querySelector(".typing");
            const textContent = typingText.textContent;
            const typingDuration = textContent.length * 0.05;

            typingText.style.animation = `typing ${typingDuration}s steps(${textContent.length}, end) forwards, blink 0.75s step-end infinite`;

            setTimeout(function () {
                typingText.style.animationPlayState = 'running';
            }, 500);
        });
    </script>

    
    <script>
        window.addEventListener("scroll", function () {
            var navbar = document.getElementById("mainNavbar");
            if (window.scrollY > 50) {
                navbar.classList.add("navbar-dark-scroll");
            } else {
                navbar.classList.remove("navbar-dark-scroll");
            }
        });
    </script>
